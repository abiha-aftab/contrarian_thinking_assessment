name: CI

on:
  pull_request:
  push:
    branches: [main, 'feature/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Lint, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm test -- --runInBand
      - run: npm run build

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: feature_flags
          POSTGRES_USER: feature_flags
          POSTGRES_PASSWORD: feature_flags
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U feature_flags -d feature_flags"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://feature_flags:feature_flags@localhost:5432/feature_flags?schema=public
      REDIS_URL: redis://localhost:6379
      LOG_LEVEL: silent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run test:integration

  docker:
    name: Build container image
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: feature-flag-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
