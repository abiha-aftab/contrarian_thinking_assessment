services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://feature_flags:feature_flags@postgres:5432/feature_flags?schema=public
      REDIS_URL: redis://redis:6379
      RUN_MIGRATIONS: 'true'
    ports:
      - '127.0.0.1:${API_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: feature_flags
      POSTGRES_USER: feature_flags
      POSTGRES_PASSWORD: feature_flags
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-55432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U feature_flags -d feature_flags']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    command: redis-server --appendonly yes
    ports:
      - '127.0.0.1:${REDIS_PORT:-56379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
